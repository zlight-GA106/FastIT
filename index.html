<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>票据回单编辑器</title>
    <link rel="stylesheet" href="style.css?v=4.0">
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="app-container">
        <div class="toolbar no-print">
            <button onclick="printReceipt()" class="btn-primary">🖨️ 服务器端打印</button>
            <button onclick="downloadPNG()">💾 存为图片</button>
            <button onclick="exportTemplate()">📤 导出当前排版</button>
            
            <input type="file" id="importFile" style="display: none;" accept=".html" onchange="importTemplate(event)">
            <button onclick="document.getElementById('importFile').click()">📥 导入外部模板</button>
            
            <div class="font-controls">
                <label>纸张规格:</label>
                <select id="paperMode" onchange="togglePaperMode()">
                    <option value="58mm">58mm 小票纸</option>
                    <option value="a4">A4 激光打印纸</option>
                </select>
            </div>

            <div class="font-controls">
                <label>预设模板:</label>
                <select id="templateSelector" onchange="loadSelectedTemplate()">
                    <option value="">（未配置）</option>
                </select>
            </div>

            <button onclick="toggleLayoutMode()" id="layoutBtn" class="btn-warning">📐 开启自由排版</button>
            <button onclick="addEditableArea()">➕ 新增文本区</button>
            <button onclick="addTableArea()">📊 新增表格</button>
            <button onclick="insertTimestamp()">🕒 插入时间</button>
            
            <button onclick="toggleAreaLock()" id="areaLockBtn">🔒 锁定选中区</button>
            <button onclick="toggleBgLock()" id="lockBtn" class="btn-warning">🔓 解锁水印</button>
            
            <div class="font-controls">
                <label>字号:</label>
                <select id="fontSize" onchange="changeFontSize()">
                    <option value="12px">小</option>
                    <option value="14px" selected>中</option>
                    <option value="18px">大</option>
                    <option value="24px">特大</option>
                </select>
            </div>
            <div class="font-controls">
                <label>水印透明度:</label>
                <input type="range" id="bgOpacity" min="0" max="1" step="0.05" value="0.1" oninput="changeBgStyle()">
            </div>
            <div class="font-controls">
                <label>水印大小:</label>
                <input type="range" id="bgSize" min="10" max="100" step="2" value="40" oninput="changeBgStyle()">
            </div>
        </div>

        <div class="receipt-wrapper">
            <div id="receipt-paper" class="receipt-paper mode-58mm">
                <div id="bg-text-layer" class="bg-text locked" contenteditable="false">加载中...</div>
                
                <div class="header">
                    <h2 id="conf-shopName" class="locked-area" contenteditable="false">加载中...</h2>
                    
                    <div id="conf-receiptTitle" class="editable-area non-deletable" contenteditable="true" style="font-size: 18px; font-weight: bold; text-align: center; margin: 5px 0;">加载中...</div>
                    
                    <div class="divider locked-area" contenteditable="false">--------------------------------</div>
                </div>
                
                <div class="editable-area" contenteditable="true">
                    <div>故障描述：</div>
                    <div>在此输入内容...</div>
                </div>
                
                <div class="locked-area footer" contenteditable="false">
                    <div class="divider">--------------------------------</div>
                    <p id="conf-footerText">加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=4.0"></script>
</body>
</html>
